# 个人微信视觉 AI 助手 配置文件 (MVP)
#
# ============================================================
# 🚀 新用户快速上手指南：
# 1. 将此文件复制为 config.yaml（同目录下）
# 2. 在项目根目录创建 .env 文件，填写你的 LLM API 密钥
# 3. 运行坐标校准脚本：python calibrate.py
#    程序会自动弹出微信截图，你用鼠标框选三个区域即可
#    校准完成后坐标会自动写入 config.yaml，无需手动填写！
# ============================================================

# 窗口校准坐标及尺寸（相对于微信窗口左上角的偏移量）
# ⚠️ 以下坐标全部由 calibrate.py 自动生成，请勿手动修改
window:
  # 运行前务必保持微信客户端为浅色模式
  theme: "light"
  # 截图目标左侧会话列表区域 [x, y, width, height]
  session_list_rect: [0, 0, 0, 0]
  # 截图目标最左侧深灰导航栏的聊天图标 [x, y, width, height]
  nav_chat_icon_rect: [0, 50, 87, 100]
  # 截图目标右侧聊天内容区域 [x, y, width, height]
  chat_content_rect: [0, 0, 0, 0]
  # 聊天标题栏区域（显示当前联系人名字）[x, y, width, height]
  chat_title_rect: [0, 0, 0, 0]
  # 底部输入框中心坐标 [x, y]
  input_box_center: [0, 0]

# OCR 相关配置
ocr:
  confidence_threshold: 0.7

# AI 模型配置（多模型支持）
# 可以配置多个模型，在监控页面切换使用
models:
  # 默认示例配置（请勿在生产环境使用这些示例密钥）
  - id: "deepseek_default"
    name: "DeepSeek V3"
    provider: "deepseek"
    api_key: ""
    base_url: "https://api.deepseek.com/v1"
    model: "deepseek-chat"
    is_default: true

  # 可以添加更多模型配置，例如：
  # - id: "gpt4_custom"
  #   name: "我的 GPT-4"
  #   provider: "openai"
  #   api_key: "sk-xxx"
  #   base_url: "https://api.openai.com/v1"
  #   model: "gpt-4"
  #   is_default: false

# 当前使用的模型 ID（对应上面某个模型的 id）
current_model_id: "deepseek_default"

# .env 文件配置（作为默认值的备选，兼容旧版本）
#   LLM_API_KEY=你的密钥
#   LLM_BASE_URL=https://api.deepseek.com/v1
#   LLM_MODEL=deepseek-chat
llm:
  api_key: ""
  base_url: ""
  model: ""

# 拟人化/防风控相关设置
anti_risk:
  global_typo_rate: 0.02
  sleep_hours: "00:00-07:00"

# 工作模式配置
# auto: 自动模式 - AI 自动识别并回复消息
# assist: 辅助模式 - AI 生成回复后粘贴到输入框，由用户手动发送
work_mode: "auto"

# ============================================
# 联系人专属人设配置 (V1.1 新增)
# ============================================
# 为不同联系人配置专属的AI回复人设，实现差异化对话风格
# 详细配置说明请参考 Development Guide.md 第六章

contacts_personas:
  # 默认人设（当没有特定配置时使用）
  default:
    name: "默认人设"
    description: "适用于所有未配置特定人设的联系人"
    system_prompt: |
      你是微信的主人本人。你正在通过自动化程序代替主人和他的朋友、家人、同事聊天。
      你必须严格遵守以下行为准则，确保不被发现是机器代聊：
      1. 语气要温暖、自然、口语化，像朋友之间轻松聊天，绝对不能用'您'、'你好'、'很高兴为您服务'等机器味词汇。
      2. 回复要简短精炼，一般控制在一两句话以内（10~20个字最佳），不要长篇大论。
      3. 表达要积极友善，适当配合语气词（嗯、哈哈、好嘞、行、好的呀），像真实的人在手机上随手打字。
      4. 如果对方发表情包或开玩笑，你要配合气氛回应，保持幽默但不要攻击性的回复。
      5. 如果对方说的话涉及情绪（生气、难过、撒娇），你要安抚、共情、体贴回应，绝对不能怼回去。
      6. 如果上下文里有特殊的例如 '[图片]' '[语音]' 等标志，委婉地说你不方便看或听，让对方发文字。
      7. 只输出你想发送的纯文本内容，不要包裹任何多余的解释、标点符号堆砌和 xml 代码块标记。
    enabled: true

  # ============================================
  # 人设模板/分组（可被多个联系人引用）
  # ============================================
  templates:
    # 工作伙伴模板 - 适用于同事、客户、商务伙伴
    work_partner:
      name: "工作伙伴"
      description: "专业、简洁、礼貌的商务语气"
      system_prompt: |
        你正在回复重要的工作伙伴，请注意：
        1. 语气要专业、简洁、礼貌，体现职业素养
        2. 回复要直接切中要点，避免过多的闲聊
        3. 工作相关用语要准确，可以用"好的"、"收到"、"明白"等确认词
        4. 适当使用"您"表示尊重，但不要过于正式
        5. 只输出回复内容，不要有任何解释性文字

    # 好朋友模板 - 适用于亲密朋友、同学
    best_friend:
      name: "好朋友"
      description: "轻松、幽默、可以开玩笑"
      system_prompt: |
        你正在回复最好的朋友，请注意：
        1. 语气要超级轻松、随意，就像平时聊天一样
        2. 可以开玩笑、调侃、使用网络流行语
        3. 回复可以简短甚至用表情包式的回复（如"哈哈"、"2333"、"绝了"）
        4. 可以适当吐槽、自嘲，不用太客气
        5. 纯聊天模式，只输出你想说的话

    # 家人模板 - 适用于家庭成员
    family:
      name: "家人"
      description: "温暖、体贴、充满关怀"
      system_prompt: |
        你正在回复家人，请注意：
        1. 语气要温暖、体贴，充满关怀和爱意
        2. 可以使用一些亲昵的称呼和表情
        3. 关注对方的感受，多体贴和关心
        4. 回复可以稍微长一点，表达更多情感
        5. 只输出你想说的话，自然亲切

  # ============================================
  # 联系人配置（可引用模板或自定义）
  # ============================================

  # 配置示例1：单联系人配置
  # "张三":
  #   name: "张三"
  #   persona_template: "work_partner"  # 引用工作伙伴模板
  #   enabled: true

  # 配置示例2：使用 aliases 为多个联系人设置相同人设（推荐）
  # "工作伙伴组":
  #   name: "工作伙伴组"
  #   description: "适用于所有工作伙伴"
  #   aliases: "张三, 李四, 王五, 赵六"  # 多个联系人用逗号分隔
  #   persona_template: "work_partner"  # 引用工作伙伴模板
  #   enabled: true

  # 配置示例3：数组形式的 aliases（更清晰）
  # "好友群":
  #   name: "好友群"
  #   description: "最好的朋友们"
  #   aliases:
  #     - "小明"
  #     - "小红"
  #     - "小刚"
  #   persona_template: "best_friend"
  #   enabled: true

  # 配置示例4：自定义人设（不引用模板）
  # "赵六":
  #   name: "赵六"
  #   description: "自定义描述"
  #   system_prompt: |
  #     你正在回复赵六，这是专属的自定义人设...
  #   enabled: true
